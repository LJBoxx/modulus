<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hack Club Modulus</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="header">
        <a href="https://hackclub.com" target="_blank">
            <img src="https://assets.hackclub.com/flag-orpheus-left.svg" alt="Hack Club Logo" id="hackclub-logo">
        </a>
    </div>
    <div class="main">
        <h1>Modulus</h1>
        <p>
            <span class="text_intro"> Lorem ipsum dolor sit amet, consectetur adipiscing elit.</span>
        </p>
        <model-viewer 
            src="/assets/imu.glb" 
            ar
            camera-controls 
            shadow-intensity="1" 
            auto-rotate 
            touch-action="pan-y"
            style="width: 100%; height: 400px; background-color: transparent;">
        </model-viewer>
    </div>
    <div class="footer">
        <p>
            <span class="text_footer">[insert footer joke here]</span>
        </p>
    </div>
</body>
